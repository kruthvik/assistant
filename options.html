<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Screenshot Analyzer Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            min-width: 320px;
            color: #333;
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            min-height: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 6px 16px;
            background: #534AB7;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover {
            background: #433AA0;
        }
        .status {
            margin-top: 8px;
            font-size: 12px;
            color: #28a745;
        }
    </style>
</head>
<body>
    <h2>Screenshot Analyzer Options</h2>
    <label for="prompt">System Prompt</label>
    <textarea id="prompt" placeholder="Describe what you see in this screenshot. Be concise and helpful."></textarea>
    <button id="save">Save</button>
    <div class="status" id="status"></div>

    <script src="options.js"></script>
</body>
</html>
